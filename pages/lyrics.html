<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lyrics - Schirius</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/artist.css" />
    <link rel="stylesheet" href="../css/artist-detail.css" />
    <style>
      .lyrics-container {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 2rem;
        margin-top: 2rem;
        white-space: pre-line;
        font-size: 1.1rem;
        line-height: 1.8;
      }
      /* iOS 26 Mini-Player Styles */
      .audio-player-wrapper {
        margin-top: 2rem;
        padding: 1.5rem;
        background: var(--surface);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        gap: 1rem;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      
      :root[data-theme="light"] .audio-player-wrapper {
        background: rgba(255, 255, 255, 0.7);
        border-color: rgba(255, 255, 255, 0.8);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(255,255,255,0.4);
      }
      
      .audio-controls-row {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      
      .play-btn {
        width: 48px;
        height: 48px;
        min-width: 48px;
        border-radius: 50%;
        background: var(--accent);
        color: white;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(176, 38, 255, 0.4);
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
      }
      
      .play-btn:active {
        transform: scale(0.94);
      }
      
      .play-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }
      
      .progress-container {
        flex-grow: 1;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      
      .time-display {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-weight: 500;
        font-variant-numeric: tabular-nums;
        min-width: 40px;
      }
      
      .progress-bar-bg {
        flex-grow: 1;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 4px;
        position: relative;
        cursor: pointer;
      }
      
      :root[data-theme="light"] .progress-bar-bg {
        background: rgba(0,0,0,0.1);
      }
      
      .progress-bar-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 4px;
        width: 0%;
        position: absolute;
        top: 0;
        left: 0;
        box-shadow: 0 0 10px var(--accent);
        transition: width 0.1s linear;
      }
      
      .progress-bar-thumb {
        width: 12px;
        height: 12px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%) scale(0);
        left: 0%;
        box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        transition: transform 0.2s ease;
      }
      
      .progress-bar-bg:hover .progress-bar-thumb,
      .progress-bar-bg:active .progress-bar-thumb {
        transform: translate(-50%, -50%) scale(1);
      }
      .spotify-btn {
        background: #1DB954; /* Spotify Green */
        color: white;
        font-weight: bold;
        border-radius: 30px;
        padding: 0.75rem 2rem;
        display: inline-block;
        margin-top: 1rem;
        text-decoration: none;
        transition: transform 0.2s;
      }
      .spotify-btn:hover {
        transform: scale(1.05);
        color: white;
      }
      audio {
        width: 100%;
        outline: none;
      }
    </style>
  </head>
  <body>
    <!-- iOS 26 Native Header -->
  <header class="ios-header">
    <div class="ios-header-inner">
      <a href="../index.html" class="brand-logo text-decoration-none ios-brand">Schirius <span class="brand-subtitle">Lyrics</span></a>
      
      <nav class="ios-nav-links">
        <a href="../index.html" class="">Home</a>
        <a href="featured.html" class="">In evidenza</a>
        <a href="discover.html" class="">Scopri</a>
        <a href="artist.html" class="">Artisti</a>
      </nav>
      
      <div class="ios-actions">
        <form class="ios-search" onsubmit="event.preventDefault(); handleSearch();">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="searchInput" type="search" placeholder="Cerca artista, album..." aria-label="Cerca">
        </form>
        <!-- Theme toggle btn will be injected here by common.js -->
      </div>
    </div>
  </header>

    <main class="main-content pt-5">
      <section class="container py-5 text-white">
        <div class="artist-header">
          <img src="" alt="Cover Singolo" class="profile-small" id="track-cover" style="display: none; border-radius: 8px;">
          <div class="artist-info">
            <span class="eyebrow text-white-50" id="track-album"></span>
            <h2 id="track-name"><div class="skeleton skeleton-text" style="width: 50%; display: inline-block;"></div></h2>
            <p class="text-white-50" id="track-artist"></p>
            
            <a href="#" id="spotify-link" class="spotify-btn" target="_blank" style="display: none;">Ascolta su Spotify</a>
          </div>
        </div>

        <div class="audio-player-wrapper" id="audio-wrapper" style="display: none;">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <h5 class="mb-0 fs-6 fw-bold" style="color: var(--text);">Anteprima Audio</h5>
            <span class="badge" style="background: rgba(176,38,255,0.15); color: var(--accent); font-weight: 600;">30 sec</span>
          </div>
          
          <div class="audio-controls-row">
            <button class="play-btn" id="custom-play-btn" aria-label="Play">
              <!-- SVG Play Icon -->
              <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <!-- SVG Pause Icon (hidden by default) -->
              <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            
            <div class="progress-container">
              <span class="time-display" id="time-current">0:00</span>
              <div class="progress-bar-bg" id="progress-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
                <div class="progress-bar-thumb" id="progress-thumb"></div>
              </div>
              <span class="time-display" id="time-total">0:30</span>
            </div>
          </div>
          
          <audio id="audio-player" style="display: none;">
            <source src="" type="audio/mpeg">
          </audio>
        </div>

        <div class="lyrics-container" id="lyrics-container">
          Ricerca del testo in corso...
        </div>
      </section>
    </main>

    <!-- Global Footer -->
    <footer class="global-footer mt-5 py-5 border-top border-white border-opacity-10 text-center text-muted">
        <div class="container">
            <h5 class="fw-bold text-white mb-3">Schirius Lyrics</h5>
            <div class="d-flex justify-content-center gap-4 mb-3">
                <a href="#" class="text-muted text-decoration-none hover-white">Chi siamo</a>
                <a href="#" class="text-muted text-decoration-none hover-white">Contatti</a>
                <a href="#" class="text-muted text-decoration-none hover-white">Termini di servizio</a>
            </div>
            <small>&copy; 2026 Schirius Lyrics. Tutti i diritti riservati.</small>
        </div>
    </footer>
    <nav class="bottom-nav" aria-label="Bottom navigation">
      <div class="bottom-inner d-flex align-items-center">
        <ul class="nav left-group me-2">
          <li class="nav-item"><a class="nav-link" href="../index.html"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V10.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="label">Home</span></a></li>
          <li class="nav-item"><a class="nav-link" href="featured.html"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/></svg></span><span class="label">In Evidenza</span></a></li>
        </ul>
        <div class="search-center"><button id="mobileSearchBtn" class="search-button" aria-label="Cerca"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
        <ul class="nav right-group ms-2">
          <li class="nav-item"><a class="nav-link" href="discover.html"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 19.5V6a1 1 0 0 1 1-1h14v14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 21V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="label">Scopri</span></a></li>
          <li class="nav-item"><a class="nav-link active" href="artist.html"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="label">Artisti</span></a></li>
        </ul>
      </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../js/common.js" defer></script>
    <script src="../js/lyrics.js" defer></script>
  </body>
</html>
