<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Album - Schirius</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/artist.css" />
    <link rel="stylesheet" href="../css/artist-detail.css" />
    <style>
      .tracklist { margin-top: 2rem; }
      .track-item {
        display: flex;
        align-items: center;
        padding: 0.75rem 0;
        border-bottom: 0.5px solid var(--border);
        transition: opacity 0.2s ease;
        text-decoration: none;
        color: var(--text);
      }
      .track-item:hover { 
        opacity: 0.7; 
      }
      .track-number { width: 35px; color: var(--text-muted); font-weight: 500; font-family: var(--font-body); font-size: 0.95rem; }
      .track-info { flex: 1; }
      .track-title { margin: 0; font-weight: 500; font-size: 1.05rem; }
      .track-artist { margin: 0; font-size: 0.85rem; color: var(--text-muted); font-weight: 400; }
    </style>
  </head>
  <body>
    <!-- iOS 26 Native Header -->
  <header class="ios-header">
    <div class="ios-header-inner">
      <a href="../index.html" class="brand-logo text-decoration-none ios-brand">Schirius <span class="brand-subtitle">Lyrics</span></a>
      
      <nav class="ios-nav-links">
        <a href="../index.html" class="">Home</a>
        <a href="featured.html" class="">In evidenza</a>
        <a href="discover.html" class="">Scopri</a>
        <a href="artist.html" class="">Artisti</a>
      </nav>
      
      <div class="ios-actions">
        <form class="ios-search" onsubmit="event.preventDefault(); handleSearch();">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="searchInput" type="search" placeholder="Cerca artista, album..." aria-label="Cerca">
        </form>
        <!-- Theme toggle btn will be injected here by common.js -->
      </div>
    </div>
  </header>

    <main class="main-content pt-5">
      <section class="container py-5 text-white">
        <div class="artist-header">
          <img src="" alt="Cover Album" class="profile-small" id="album-cover" style="display: none; border-radius: 8px;">
          <div class="artist-info">
            <span class="eyebrow text-white-50" id="album-type">Album</span>
            <h2 id="album-name"><div class="skeleton skeleton-text" style="width: 50%; display: inline-block;"></div></h2>
            <p class="text-white-50" id="album-artist"></p>
          </div>
        </div>

        <div class="tracklist" id="tracklist-container">
          <!-- Le tracce verranno caricate qui da JS -->
        </div>
      </section>
    </main>

    <!-- Global Footer -->
    <footer class="global-footer mt-5 py-5 border-top border-white border-opacity-10 text-center text-muted">
        <div class="container">
            <h5 class="fw-bold text-white mb-3">Schirius Lyrics</h5>
            <div class="d-flex justify-content-center gap-4 mb-3">
                <a href="#" class="text-muted text-decoration-none hover-white">Chi siamo</a>
                <a href="#" class="text-muted text-decoration-none hover-white">Contatti</a>
                <a href="#" class="text-muted text-decoration-none hover-white">Termini di servizio</a>
            </div>
            <small>&copy; 2026 Schirius Lyrics. Tutti i diritti riservati.</small>
        </div>
    </footer>
    <nav class="bottom-nav" aria-label="Bottom navigation">
      <div class="bottom-inner d-flex align-items-center">
        <ul class="nav left-group me-2">
          <li class="nav-item"><a class="nav-link" href="../index.html"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V10.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="label">Home</span></a></li>
          <li class="nav-item"><a class="nav-link" href="featured.html"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/></svg></span><span class="label">In Evidenza</span></a></li>
        </ul>
        <div class="search-center"><button id="mobileSearchBtn" class="search-button" aria-label="Cerca"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
        <ul class="nav right-group ms-2">
          <li class="nav-item"><a class="nav-link" href="discover.html"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 19.5V6a1 1 0 0 1 1-1h14v14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 21V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="label">Scopri</span></a></li>
          <li class="nav-item"><a class="nav-link active" href="artist.html"><span class="icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="label">Artisti</span></a></li>
        </ul>
      </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../js/common.js" defer></script>
    <script src="../js/album-detail.js" defer></script>
  </body>
</html>
