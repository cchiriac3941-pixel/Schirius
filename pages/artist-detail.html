    <main class="main-content pt-5">
      <section class="container py-5 text-white">
        <div class="section-header mb-4">
          <span class="eyebrow text-white-50">Artista</span>
        </div>

        <!-- 1. HEADER ARTISTA MODIFICATO CON GLI ID -->
        <div class="artist-header">
          <!-- Mettiamo un'immagine di placeholder e l'id "artist-img" -->
          <img src="" alt="Cover Artista" class="profile-small" id="artist-img" style="display: none;">
          <div class="artist-info">
            <!-- Mettiamo l'id "artist-name" al posto di Lil Baby -->
            <h2 id="artist-name">Caricamento...</h2>
            <p class="text-white-50" id="artist-bio"></p>
          </div>
        </div>

        <!-- Sezione Album -->
        <div class="albums-section mt-4" id="albums-section" style="display: none;">
          <h2 class="section-title h4 mb-3 text-white">Album</h2>
          <div class="artist-releases" id="albums-container">
          </div>
        </div>

        <!-- Sezione Singoli -->
        <div class="singles-section mt-5" id="singles-section" style="display: none;">
          <h2 class="section-title h4 mb-3 text-white">Singoli</h2>
          <div class="artist-releases" id="singles-container">
          </div>
        </div>

        <!-- Sezione Featuring -->
        <div class="featuring-section mt-5" id="featuring-section" style="display: none;">
          <h2 class="section-title h4 mb-3 text-white">Featuring</h2>
          <div class="artist-releases" id="featuring-container">
          </div>
        </div>
      </section>
    </main>
